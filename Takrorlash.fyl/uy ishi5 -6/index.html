<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pricing Plans</title>
    <link rel="stylesheet" href="./css/main.css">
</head>
<body>

    <div class="container">
        <div class="card">

            <div class="box">
                <img src="./img/telefon.png" alt="mobile">
                <h3>MOBILE</h3>
                <p>Get notifications about new releases in our mobile app.</p>
                <div class="price">$10 <span>/ month</span></div>
            </div>

            <div class="box">
                <img src="./img/desctop.png" alt="desktop">
                <h3>DESKTOP</h3>
                <p>Enjoy new episodes on your laptop in browser with our web service, which supports all the platforms.</p>
                <div class="price">$15 <span>/ month</span></div>
            </div>

            <div class="box">
                <img src="./img/tv.png" alt="tv">
                <h3>TV</h3>
                <p>Watch your favorite series at home on large screen with our TV application.</p>
                <div class="price">$20 <span>/ month</span></div>
            </div>

        </div>
    </div>

</body>
</html>
