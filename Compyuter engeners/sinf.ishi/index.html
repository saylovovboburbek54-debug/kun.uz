<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pricing</title>

<style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#8fb0dc;
    font-family: "Segoe UI", Arial, sans-serif;
}

.box{
    background:#fff;
    width:900px;
    padding:45px 60px;
    display:flex;
    justify-content:space-between;
    border-radius:4px;
    box-shadow:0 15px 30px rgba(0,0,0,.25);
}

.item{
    width:230px;
    text-align:center;
}

.item img{
    width:55px;
    margin-bottom:20px;
}

.item h2{
    font-size:14px;
    letter-spacing:3px;
    color:#5f6edb;
    margin-bottom:15px;
}

.item p{
    font-size:13px;
    line-height:1.6;
    color:#8a8a8a;
    margin-bottom:25px;
}

.price{
    font-size:32px;
    color:#5f6edb;
    font-weight:600;
}

.price span{
    font-size:14px;
    color:#aaa;
}
</style>
</head>

<body>

<div class="box">

    <div class="item">
        <img src="https://cdn-icons-png.flaticon.com/512/15/15874.png">
        <h2>MOBILE</h2>
        <p>
            Get notifications about new releases in our mobile app.
        </p>
        <div class="price">$10<span>/month</span></div>
    </div>

    <div class="item">
        <img src="https://cdn-icons-png.flaticon.com/512/29/29240.png">
        <h2>DESKTOP</h2>
        <p>
            Enjoy new episodes on your laptop in browser with our web service.
        </p>
        <div class="price">$15<span>/month</span></div>
    </div>

    <div class="item">
        <img src="https://cdn-icons-png.flaticon.com/512/633/633600.png">
        <h2>TV</h2>
        <p>
            Watch your favorite series at home on large screen with TV app.
        </p>
        <div class="price">$20<span>/month</span></div>
    </div>

</div>

</body>
</html>
