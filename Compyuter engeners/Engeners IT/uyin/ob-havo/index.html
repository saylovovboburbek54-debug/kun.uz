<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<title>Ob-havo sayti</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
    }

    body {
        background: #4fa3d1;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .container {
        width: 100%;
        height: 100%;
        position: relative;
    }

    /* Sarlavha */
    .title {
        position: absolute;
        top: 30px;
        left: 50%;
        transform: translateX(-50%);
        background: white;
        padding: 10px 25px;
        border-radius: 10px;
        font-weight: bold;
        letter-spacing: 1px;
    }

    /* Kartochka */
    .card {
        position: absolute;
        top: 120px;
        left: 50%;
        transform: translateX(-50%);
        background: white;
        width: 520px;
        padding: 40px;
        border-radius: 15px;
        display: flex;
        justify-content: space-between;
        box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    }

    .day {
        text-align: center;
        width: 45%;
    }

    .icon {
        font-size: 70px;
        margin-bottom: 15px;
    }

    .sun {
        color: gold;
    }

    .cloud {
        color: #3fa9c9;
    }

    .date {
        font-weight: bold;
        margin-bottom: 8px;
    }

    .temp {
        color: #555;
    }
</style>
</head>

<body>

<div class="container">

    <div class="title">OB-HAVO SAYTI</div>

    <div class="card">
        <div class="day">
            <div class="icon sun">☀️</div>
            <div class="date">4-MAY SESHANBA</div>
            <div class="temp">25°C – 30°C</div>
        </div>

        <div class="day">
            <div class="icon cloud">🌧️</div>
            <div class="date">5-MAY CHORSHANBA</div>
            <div class="temp">25°C – 30°C</div>
            <div class="rain">  </div>
        </div>
    </div>

</div>

</body>
</html>
