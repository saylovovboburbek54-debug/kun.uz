<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Contact</title>
    <link rel="stylesheet" href="./css/main.css">
</head>
<body>

<div class="container">

    <!-- LEFT SIDE -->
    <div class="left">
        <h2>Напишите нам</h2>

        <input type="text" placeholder="Имя">
        <input type="email" placeholder="Электронная почта">
        <input type="text" placeholder="Номер телефона">
        <input type="text" placeholder="Тема">
        <textarea placeholder="Текст"></textarea>

        <label class="file-btn">
             Прикрепить файл📎
            <input type="file" hidden>
        </label>

        <div class="code-box">
            <input type="text" placeholder="Код">
            <span class="captcha">4 k 7 Z a</span>
        </div>

        <button class="submit-btn">Отправить</button>
    </div>

    <!-- RIGHT SIDE -->
    <div class="right">
        <h3>NAMANGANLIKLAR24</h3>

        <div class="info">
            <strong>Электронная почта</strong><br>
            info@namanganliklar24.uz
        </div>

        <div class="info">
            <strong>Социальные сети</strong>
            <div class="social">
                <img src="./img/facebook.svg">
                <img src="./img/tivitr.svg">
                <img src="./img/olx.svg">
            </div>
        </div>

        <div class="info">
            <strong>Телеграм канал</strong><br>
            <a href="#" class="telegram-btn">Подписаться</a>
        </div>

        <div class="info">
            <strong>Мобильная приложение</strong>
            <div class="apps">
                <img src="./img/google play.svg">
                <img src="./img/App Store.svg">
            </div>
        </div>

    </div>

</div>

</body>
</html>
