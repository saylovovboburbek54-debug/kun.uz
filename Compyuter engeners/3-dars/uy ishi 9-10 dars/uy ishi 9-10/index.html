<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Напишите нам</title>
    <link rel="stylesheet" href="css/main.css">
</head>
<body>

    <h2>Напишите нам</h2>
<div class="container">

    <!-- LEFT FORM -->
    <div class="form-section">

        <input type="text" placeholder="Имя">
        <input type="email" placeholder="Электронная почта">
        <input type="text" placeholder="Номер телефона">
        <input type="text" placeholder="Тема">

        <textarea placeholder="Текст"></textarea>

        <button class="file-btn"> Прикрепить файл 📎</button>

        <div class="captcha">
            <input type="text" placeholder="Код" id="code">
              <label for="code">4 k 7 Z a</label>
            <!-- <code>4 k 7 Z a</code> -->
        </div>

        <button class="submit-btn">Отправить</button>
    </div>


    <!-- RIGHT INFO CARD -->
    <div class="info-section">
        <h2 class="logo">NAMANGANLIKLAR24</h2>

        <div class="info-row">
            <span>Электронная почта</span>
            <span>info@namanganliklar24.uz</span>
        </div>

        <div class="info-row">
            <span>Социальные сети</span>
            <div class="socials">
                 <img src="/image/facebook.svg">
                  <img src="/image/tivitr.svg">
                   <img src="/image/olx.svg">
               
            </div>
        </div>

        <div class="info-row">
            <span>Телеграм канал</span>
            <button class="telegram-btn"></button>
         
        </div>

        <div class="info-row">
            <span>Мобильная приложение</span>
            <div class="stores">
                 <img src="./image/google play.svg">
                 <img src="./image/App Store.svg">
            </div>
        </div>
    </div>

</div>

</body>
</html>
