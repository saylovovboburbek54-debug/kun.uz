<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PUBG Portfolio</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>

    <!-- NAVBAR -->
    <header>
        <div class="logo">PUBG MOBILE</div>
        <nav>

            <a href="#">Home</a>
            <a href="#">Portfolio</a>
            <a href="#">Blog</a>
            <a href="#">Team</a>
            <a href="#">FAQ</a>
        </nav>
    </header>

    <!-- HERO SECTION -->
    <section class="hero">
        <div class="hero-text">
            <h1>PORTFOLIO</h1>
            <p>SCROLL DOWN</p>
          
            <img src="./img/pubg.svg">
        </div>
    </section>

    <!-- MAPS SECTION -->
    <section class="maps-section">
        <h2>MAPS</h2>

        <div class="maps-container">
            <div class="map-card">
                <img src="img/erangle.svg" alt="Erangle">
                <span>Erangle</span>
            </div>

            <div class="map-card">
                <img src="img/miramar.svg" alt="Miramar">
                <span>Miramar</span>
            </div>

            <div class="map-card">
                <img src="img/sanhok.svg" alt="Sanhok">
                <span>Sanhok</span>
            </div>

            <div class="map-card">
                <img src="img/vinkedi.svg" alt="Vikendi">
                <span>Vikendi</span>
            </div>
        </div>
    </section>

</body>
</html>
